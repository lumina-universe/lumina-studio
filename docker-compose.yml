version: '3.8'

services:
  lumina-studio:
    build: .
    container_name: lumina-studio
    ports:
      - "8500:8500"
    volumes:
      - ./models:/app/models
      - ./model_output:/app/model_output
      - ./run_history.json:/app/run_history.json
      - ./active_dataset.jsonl:/app/active_dataset.jsonl
      - ./.env:/app/.env
    restart: unless-stopped
    environment:
      - PORT=8500
      - NODE_ENV=production
